<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md. Naeem Khan — Video Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0c0e;
    --bg-2: #151517;
    --plate: #1c1c1f;
    --accent: #ff6a1a;
    --accent-2: #f0a400;
    --paper: #f2eee4;
    --steel: #7a7a82;
    --steel-dim: #3a3a40;
    --rivet: #45454b;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body{
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
    background:
      radial-gradient(1200px 600px at 15% 0%, rgba(255,106,26,0.08), transparent 60%),
      radial-gradient(900px 500px at 100% 100%, rgba(240,164,0,0.06), transparent 55%),
      var(--bg);
  }

  .card{
    width: 100%;
    max-width: 420px;
    background: var(--bg-2);
    border: 1px solid var(--steel-dim);
    border-radius: 6px;
    display: grid;
    grid-template-columns: 1fr;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
  }

  /* corner bolts to sell the "equipment plate" idea */
  .bolt{
    position:absolute;
    width:9px; height:9px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #9a9aa1, #3d3d42 70%);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
    z-index: 5;
  }
  .bolt.tl{ top:14px; left:14px; }
  .bolt.tr{ top:14px; right:14px; }
  .bolt.bl{ bottom:14px; left:14px; }
  .bolt.br{ bottom:14px; right:14px; }

  /* ---- Photo panel ---- */
  .photo-panel{
    position: relative;
    background: #000;
    aspect-ratio: 4 / 5;
    width: 100%;
  }
  .photo-panel img{
    width:100%; height:100%;
    object-fit: cover;
    display:block;
    filter: saturate(0.92) contrast(1.05);
  }
  .photo-panel::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(12,12,14,0) 45%, rgba(12,12,14,0.92) 100%),
                linear-gradient(90deg, rgba(12,12,14,0.15) 0%, rgba(12,12,14,0) 30%);
  }
  .op-tag{
    position:absolute;
    left: 18px; bottom: 18px;
    z-index: 3;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    color: var(--accent-2);
    text-transform: uppercase;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .op-tag::before{
    content:"";
    width:6px; height:6px;
    background: var(--accent);
    display:inline-block;
    box-shadow: 0 0 8px var(--accent);
  }

  .vert-label{
    position:absolute;
    top: 18px; right: 16px;
    z-index: 3;
    writing-mode: vertical-rl;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(242,238,228,0.55);
    text-transform: uppercase;
  }

  /* ---- Info panel ---- */
  .info-panel{
    padding: 30px 32px 26px;
    display:flex;
    flex-direction:column;
    gap: 18px;
    position:relative;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .eyebrow .rule{
    height:1px; flex:1;
    background: linear-gradient(90deg, var(--steel-dim), transparent);
  }

  .name{
    font-family:'Oswald', sans-serif;
    font-weight: 600;
    font-size: 34px;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    line-height: 1.05;
    color: var(--paper);
    margin: 0;
  }
  .role{
    font-family:'Oswald', sans-serif;
    font-weight: 400;
    font-size: 14.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--steel);
    margin-top: 2px;
  }
  .role b{
    color: var(--accent-2);
    font-weight: 500;
  }

  /* spec plate block */
  .plate{
    background: var(--plate);
    border: 1px solid var(--steel-dim);
    border-radius: 4px;
    padding: 4px 0;
  }
  .spec-row{
    display:grid;
    grid-template-columns: 108px 1fr;
    align-items:center;
    padding: 9px 14px;
    border-bottom: 1px dashed rgba(122,122,130,0.25);
    gap: 10px;
  }
  .spec-row:last-child{ border-bottom:none; }
  .spec-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--steel);
  }
  .spec-value{
    font-family:'JetBrains Mono', monospace;
    font-size: 13.5px;
    color: var(--paper);
    word-break: break-all;
  }
  .spec-value a{
    color: var(--paper);
    text-decoration:none;
    border-bottom: 1px solid rgba(255,106,26,0.4);
  }
  .spec-value a:hover{ border-bottom-color: var(--accent); color: var(--accent-2); }

  .tag-row{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 6px 10px;
    border-radius: 3px;
    border: 1px solid var(--steel-dim);
    color: var(--paper);
    background: rgba(255,255,255,0.02);
  }
  .tag.blood{
    border-color: rgba(255,106,26,0.5);
    color: var(--accent-2);
    display:flex; align-items:center; gap:6px;
  }
  .tag.blood::before{
    content:"";
    width:7px; height:7px;
    background: var(--accent);
    border-radius: 1px;
    transform: rotate(45deg);
  }

  .actions{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .btn{
    font-family:'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.02em;
    padding: 11px 18px;
    border-radius: 3px;
    text-decoration:none;
    cursor:pointer;
    border: none;
    display:inline-flex;
    align-items:center;
    gap: 8px;
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .btn:hover{ transform: translateY(-1px); filter: brightness(1.08); }
  .btn:active{ transform: translateY(0); }
  .btn-primary{
    background: var(--accent);
    color: #0c0c0e;
  }
  .btn-outline{
    background: transparent;
    color: var(--paper);
    border: 1px solid var(--steel-dim);
  }
  .btn-outline:hover{ border-color: var(--accent); color: var(--accent-2); }
  .btn-whatsapp{
    background: #25D366;
    color: #0c0c0e;
  }
  .btn-facebook{
    background: #1877F2;
    color: #f2eee4;
  }

  .footer-strip{
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--steel-dim);
    display:flex;
    justify-content: space-between;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--steel);
  }

  @media (max-width: 480px){
    .name{ font-size: 28px; }
    .spec-row{ grid-template-columns: 96px 1fr; }
    .actions{ flex-direction: column; }
    .btn{ width: 100%; justify-content: center; }
  }
</style>
</head>
